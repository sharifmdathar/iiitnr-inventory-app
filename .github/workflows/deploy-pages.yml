name: Deploy Web App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Web App
        working-directory: app
        run: |
          chmod +x ./gradlew
          ./gradlew :web:wasmJsBrowserDistribution --no-configuration-cache -Pkotlin.native.ignoreDisabledTargets=true

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/web/build/dist/wasmJs/productionExecutable/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
